# Alex's solver config matching Ilya's parameters (Re=100, 105x105 grid).
# mode=fixed_dt_steps: runs exactly n_time_steps with the given dt.
# t_end = dt * n_time_steps = 0.01 * 5000 = 50.0  (matches Ilya)
mode=fixed_dt_steps
nx=105
ny=105
t_max=50.0
n_time_steps=5000
dt=0.01
Re=100
steady_tolerance=1e-6

save_every_step=500
save_dir=data_alex

log_info.enabled=false
log_info.print_every_step=100
